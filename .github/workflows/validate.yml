name: Validate Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Check and Package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate icons
        run: npm run build:icons

      - name: Run checks
        run: npm run check

      - name: Build extension package
        run: npm run package

      - name: Upload extension ZIP
        uses: actions/upload-artifact@v4
        with:
          name: cf-gyms-statement-exporter
          path: dist/cf-gyms-statement-exporter-v*.zip
          if-no-files-found: error
