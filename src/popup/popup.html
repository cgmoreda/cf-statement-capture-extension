<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codeforces Export</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">ICPC Assiut</p>
        <h1>Codeforces PDF Exporter</h1>
        <p id="status">Checking page...</p>
      </header>
      <dl id="details" hidden></dl>
      <label class="option">
        <input id="include-cover" type="checkbox">
        Include cover page
      </label>
      <div class="actions">
        <button id="export" type="button" disabled>Download PDF</button>
        <button id="print" type="button" disabled>Open print preview</button>
      </div>
      <p id="message" role="status"></p>
      <footer>
        <span>Runs locally. No data is sent.</span>
        <a href="https://icpcassiut.org" target="_blank" rel="noreferrer">icpcassiut.org</a>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
